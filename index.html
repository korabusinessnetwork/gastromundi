<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GASTROMUNDI by Kora</title>
    <!--
      Fontes white-label (ADR-007). São as famílias que o tema de um tenant
      pode escolher via `font_titulo` / `font_texto` (tokens --gm-font-*).
      Todas GRÁTIS (OFL): Sora é a fonte de TEXTO do DNA do Casa Coffee;
      Saira é o stand-in livre da fonte de TÍTULOS do Casa (Rexton, paga —
      licenciar é decisão de custo do dono). Sem tema custom, o GastroMundi
      não usa nenhuma delas (fica no system-ui default), então nada muda.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Saira:wght@500;600;700;800&family=Sora:wght@300;400;600;700&display=swap" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
      ::-webkit-scrollbar { width: 0; height: 0; }
      * { scrollbar-width: none; }
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
